<!DOCTYPE html>
<html>
<head>
    <title>QR Generator</title>
</head>
<body>

<h1>Smart QR Generator</h1>

<form method="POST">
    <input type="text" name="data" placeholder="Enter URL or Text">
    <button type="submit">Generate QR</button>
</form>

{% if qr_path %}
    <h3>Your QR Code:</h3>
    <img src="{{ qr_path }}" width="200">
{% endif %}

</body>
</html>

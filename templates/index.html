<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart QR Generator</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:
            linear-gradient(135deg,#0f172a,#1e293b,#111827);
            overflow:hidden;
            position:relative;
            padding:20px;
        }

        /* Background Glow */

        .circle{
            position:absolute;
            width:350px;
            height:350px;
            border-radius:50%;
            background:rgba(255,255,255,0.05);
            filter:blur(100px);
        }

        .circle1{
            top:-100px;
            left:-100px;
        }

        .circle2{
            bottom:-100px;
            right:-100px;
        }

        .container{
            width:100%;
            max-width:450px;
            background:rgba(255,255,255,0.08);
            backdrop-filter:blur(15px);
            border:1px solid rgba(255,255,255,0.1);
            border-radius:25px;
            padding:40px;
            text-align:center;
            color:white;
            box-shadow:0 15px 40px rgba(0,0,0,0.4);
            animation:fadeIn 1s ease;
            z-index:10;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(30px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        .logo{
            font-size:45px;
            margin-bottom:10px;
        }

        h1{
            font-size:32px;
            margin-bottom:10px;
            font-weight:700;
        }

        p{
            color:#cbd5e1;
            margin-bottom:30px;
            font-size:15px;
        }

        input{
            width:100%;
            padding:16px;
            border:none;
            border-radius:14px;
            background:rgba(255,255,255,0.12);
            color:white;
            font-size:15px;
            outline:none;
            margin-bottom:20px;
            transition:0.3s;
        }

        input::placeholder{
            color:#cbd5e1;
        }

        input:focus{
            background:rgba(255,255,255,0.18);
            transform:scale(1.02);
        }

        button{
            width:100%;
            padding:15px;
            border:none;
            border-radius:14px;
            background:linear-gradient(135deg,#06b6d4,#3b82f6);
            color:white;
            font-size:16px;
            font-weight:600;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            transform:translateY(-3px);
            box-shadow:0 10px 25px rgba(59,130,246,0.4);
        }

        .qr-box{
            margin-top:35px;
            animation:fadeIn 1s ease;
        }

        .qr-box h3{
            margin-bottom:15px;
            font-size:20px;
        }

        .qr-box img{
            width:230px;
            background:white;
            padding:15px;
            border-radius:20px;
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
        }

        .download-btn{
            display:inline-block;
            margin-top:20px;
            padding:12px 25px;
            background:linear-gradient(135deg,#22c55e,#16a34a);
            color:white;
            text-decoration:none;
            border-radius:12px;
            font-weight:600;
            transition:0.3s;
        }

        .download-btn:hover{
            transform:translateY(-3px);
            box-shadow:0 10px 20px rgba(34,197,94,0.4);
        }

        .footer{
            margin-top:30px;
            color:#94a3b8;
            font-size:14px;
        }

        @media(max-width:500px){

            .container{
                padding:25px;
            }

            h1{
                font-size:26px;
            }

            .qr-box img{
                width:190px;
            }
        }

    </style>
</head>
<body>

    <div class="circle circle1"></div>
    <div class="circle circle2"></div>

    <div class="container">

        <div class="logo">⚡</div>

        <h1>Smart QR Generator</h1>

        <p>Create stylish and modern QR codes instantly</p>

        <form method="POST">

            <input
                type="text"
                name="data"
                placeholder="Enter URL or Text"
                required
            >

            <button type="submit">
                Generate QR Code
            </button>

        </form>

        {% if qr_path %}
        <div class="qr-box">

            <h3>Your QR Code</h3>

            <img src="{{ qr_path }}" alt="QR Code">

            <br>

            <a href="{{ qr_path }}"
               download
               class="download-btn">
               Download QR
            </a>

        </div>
        {% endif %}

        <div class="footer">
            Developed by Madhavi Chittimalla ✨
        </div>

    </div>

</body>
</html>
